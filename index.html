<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CentOS Web Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .badge {
      display: inline-block;
      background: #2E5D9E;
      color: white;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 28px;
      color: #60a5fa;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 30px;
    }
    .info-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
    }
    .info-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .info-value {
      font-size: 15px;
      color: #e2e8f0;
      font-weight: bold;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #052e16;
      border: 1px solid #166534;
      border-radius: 8px;
      padding: 12px 16px;
    }
    .dot {
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text { color: #22c55e; font-size: 14px; }
    .footer {
      margin-top: 20px;
      text-align: center;
      color: #475569;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">🖥️ Linux Server Project</span>
    <h1>CentOS Web Server</h1>
    <p class="subtitle">Deployed by admin | Dự án thực hành System Admin</p>

    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Hệ điều hành</div>
        <div class="info-value">CentOS Stream 9</div>
      </div>
      <div class="info-item">
        <div class="info-label">Web Server</div>
        <div class="info-value">Apache HTTP</div>
      </div>
      <div class="info-item">
        <div class="info-label">IP Address</div>
        <div class="info-value">192.168.146.130</div>
      </div>
      <div class="info-item">
        <div class="info-label">Môi trường</div>
        <div class="info-value">VMware Workstation</div>
      </div>
    </div>

    <div class="status">
      <div class="dot"></div>
      <span class="status-text">Server đang hoạt động bình thường</span>
    </div>
  </div>

  <div class="footer">
    Apache HTTP Server · SSH · Firewalld · CentOS Stream 9
  </div>
</body>
</html>
